version: "3.9"

services:
  myapp:
    build:
      context: .
      dockerfile: Dockerfile
    image: myapp:latest
    container_name: myapp
    ports:
      - "9012:9012"
    environment:
      SPRING_PROFILES_ACTIVE: dev
    restart: always
  postgres:
    image: postgres:16
    container_name: postgres16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tvshow
    ports:
      - "5433:5432"
    networks:
      - mynetwork
volumes:
  postgres-db-volume:
    driver: local
    driver_opts:
      type: none
      device: ./postgres-data
      o: bind
networks:
  mynetwork:
    driver: bridge